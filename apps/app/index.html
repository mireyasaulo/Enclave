<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>隐界</title>
    <!-- 公网隧道下让浏览器尽早完成同源 TCP/TLS 握手并 keep-alive（/api/*、
         /socket.io、/assets/* 共用同一个连接）。 -->
    <link rel="preconnect" href="/" crossorigin />
    <link rel="dns-prefetch" href="/" />
    <script>
      // 后端版本变化时自动升级（清 SW + 缓存 + reload），用户完全无感知。
      // 这段 inline 脚本独立于 React bundle 之外，每个页面加载都会执行；
      // setInterval 让已加载页面也会在 30s 内自动检测到新部署。
      (function () {
        if (typeof window === "undefined") return;
        var STORAGE_KEY = "yinjie:server-build-id";
        var INTERVAL_MS = 30000;
        var inFlight = false;
        function check() {
          if (inFlight) return;
          inFlight = true;
          fetch("/api/system/build-id", { cache: "no-store", credentials: "same-origin" })
            .then(function (r) { return r.ok ? r.json() : null; })
            .then(function (data) {
              inFlight = false;
              var nextId = data && data.buildId;
              if (!nextId) return;
              var prevId = null;
              try { prevId = window.localStorage.getItem(STORAGE_KEY); } catch (e) {}
              if (prevId && prevId !== nextId) {
                Promise.resolve()
                  .then(function () {
                    if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
                      return navigator.serviceWorker.getRegistrations().then(function (regs) {
                        return Promise.all(regs.map(function (reg) { return reg.unregister(); }));
                      });
                    }
                  })
                  .then(function () {
                    if (typeof caches !== "undefined" && caches.keys) {
                      return caches.keys().then(function (keys) {
                        return Promise.all(keys.map(function (k) { return caches.delete(k); }));
                      });
                    }
                  })
                  .catch(function () {})
                  .then(function () {
                    try { window.localStorage.setItem(STORAGE_KEY, nextId); } catch (e) {}
                    window.location.reload();
                  });
                return;
              }
              try { window.localStorage.setItem(STORAGE_KEY, nextId); } catch (e) {}
            })
            .catch(function () { inFlight = false; });
        }
        // 启动时立即检查一次，避免首屏拿到旧版本后还要再等 30s
        check();
        setInterval(check, INTERVAL_MS);
        document.addEventListener("visibilitychange", function () {
          if (document.visibilityState === "visible") check();
        });
      })();
    </script>
    <style>
      :root {
        color-scheme: light;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        background: #f5f5f5;
        color: #111827;
      }

      #root {
        min-height: 100vh;
        min-height: 100dvh;
      }

      .boot-screen {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding:
          max(24px, env(safe-area-inset-top, 0px))
          max(24px, env(safe-area-inset-right, 0px))
          max(24px, env(safe-area-inset-bottom, 0px))
          max(24px, env(safe-area-inset-left, 0px));
        box-sizing: border-box;
      }

      .boot-card {
        width: min(100%, 520px);
        background: #ffffff;
        border: 1px solid rgba(17, 24, 39, 0.05);
        border-radius: 32px;
        padding: 40px 32px;
        text-align: center;
        box-sizing: border-box;
      }

      .boot-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        border-radius: 999px;
        border: 1px solid rgba(7, 193, 96, 0.16);
        background: rgba(7, 193, 96, 0.08);
        color: #15803d;
        font-size: 11px;
        letter-spacing: 0.34em;
        text-transform: uppercase;
      }

      .boot-logo {
        width: 80px;
        height: 80px;
        margin: 24px auto 0;
        border-radius: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #07c160, #34c759);
        color: #ffffff;
        font-size: 28px;
        font-weight: 600;
        animation: boot-pulse 1.2s ease-in-out infinite;
      }

      .boot-title {
        margin: 24px 0 0;
        font-size: 34px;
        line-height: 1.2;
        letter-spacing: 0.08em;
      }

      .boot-copy {
        margin: 16px 0 0;
        font-size: 14px;
        line-height: 2;
        color: #6b7280;
      }

      .boot-steps {
        margin-top: 24px;
        display: grid;
        gap: 12px;
      }

      .boot-step {
        border-radius: 22px;
        border: 1px solid rgba(17, 24, 39, 0.05);
        background: #fafafa;
        padding: 12px 16px;
        text-align: left;
      }

      .boot-step-label {
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #9ca3af;
      }

      .boot-step-value {
        margin-top: 8px;
        font-size: 14px;
        font-weight: 600;
      }

      .boot-notice {
        margin-top: 24px;
        border-radius: 22px;
        padding: 14px 16px;
        background: rgba(7, 193, 96, 0.06);
        border: 1px solid rgba(7, 193, 96, 0.12);
        text-align: left;
        font-size: 14px;
        line-height: 1.8;
        color: #475569;
      }

      @media (min-width: 640px) {
        .boot-steps {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @keyframes boot-pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }

        50% {
          transform: scale(0.97);
          opacity: 0.9;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-screen">
        <div class="boot-card">
          <div class="boot-badge">Beyond Reality</div>
          <div class="boot-logo">隐界</div>
          <h1 class="boot-title">欢迎回到你的世界</h1>
          <p class="boot-copy">
            正在连接世界入口并同步这次进入所需的运行信息。
          </p>
          <div class="boot-steps">
            <div class="boot-step">
              <div class="boot-step-label">Step 1</div>
              <div class="boot-step-value">确认入口</div>
            </div>
            <div class="boot-step">
              <div class="boot-step-label">Step 2</div>
              <div class="boot-step-value">同步世界主人</div>
            </div>
            <div class="boot-step">
              <div class="boot-step-label">Step 3</div>
              <div class="boot-step-value">恢复上次停留</div>
            </div>
          </div>
          <div class="boot-notice">如果网络或入口服务较慢，这个启动页会先保留，避免用户看到空白页面。</div>
        </div>
      </div>
    </div>
    <script>
      // 浏览器（含内网穿透域名）首次访问时没有任何持久化配置或注入配置，
      // runtime 启动会判定 worldAccessMode 缺失而停在 "请先回到 setup" 页面。
      // 这里给纯 web 上下文一个默认值：apiBaseUrl 用当前 origin（nginx 已把
      // /api/、/socket.io/、/cloud/ 反代到本机后端），worldAccessMode=local。
      // Capacitor / Tauri 等原生壳启动后会通过 hydrateNativeRuntimeConfig
      // 用真实的 apiBaseUrl 覆盖，所以这段注入不会干扰移动端和桌面壳。
      (function () {
        var w = window;
        if (!w || !w.location) return;
        var loc = w.location;
        if (loc.protocol !== "http:" && loc.protocol !== "https:") return;
        if (w.__YINJIE_RUNTIME_CONFIG__) return;
        if (w.Capacitor || w.__TAURI__ || w.__TAURI_INTERNALS__) return;
        w.__YINJIE_RUNTIME_CONFIG__ = {
          apiBaseUrl: loc.origin,
          socketBaseUrl: loc.origin,
          worldAccessMode: "local",
          configStatus: "configured",
          bootstrapSource: "window",
        };
      })();
    </script>
    <script>
      // 公网隧道带宽 ~50KB/s，首屏 React 链下载 + 解析 + AppLocaleProvider catalog
      // 加载至少 3-5s。getWorldOwner 是 splash 必发的 API（~500ms RTT），早一点
      // 启动就能省掉 splash mount 后那一段等待 —— 让浏览器在解析 HTML 时就把这
      // 个请求发出去，与所有 JS 下载并行。SplashPage 直接 await 这个 in-flight
      // Promise，不再重复发 fetch。
      // 仅 worldAccessMode=local（即纯 web）下做：cloud / 原生壳走另一套 baseUrl，
      // 不能假设 origin 就是 api 入口。
      (function () {
        var w = window;
        if (!w || !w.fetch) return;
        if (w.Capacitor || w.__TAURI__ || w.__TAURI_INTERNALS__) return;
        var cfg = w.__YINJIE_RUNTIME_CONFIG__;
        if (!cfg || cfg.worldAccessMode !== "local") return;
        try {
          w.__YINJIE_BOOT_OWNER_FETCH__ = w.fetch("/api/world/owner", {
            credentials: "same-origin",
            headers: { "Accept": "application/json" },
          });
        } catch (_e) {
          // 网络/CORS 异常等下让 splash 自己 fallback 走完整链路。
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
