<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>隐界</title>
    <!-- 公网隧道下让浏览器尽早完成同源 TCP/TLS 握手并 keep-alive（/api/*、
         /socket.io、/assets/* 共用同一个连接）。 -->
    <link rel="preconnect" href="/" crossorigin />
    <link rel="dns-prefetch" href="/" />
    <script>
      // 自动 reload 已下线：dev 环境下后端 nest watch 一编译就换 build-id，
      // 让前端轮询触发 reload 会把页面卡进死循环；改为手动刷新。
      // 想检测新版本可以自己调 GET /api/system/build-id 与
      // localStorage["yinjie:server-build-id"] 比对，需要时再触发刷新。
    </script>
    <script>
      // SW kill switch (默认 no-op)
      // 触发条件: URL 含 ?nosw=1 或 localStorage["yinjie:nosw"]==="1"
      // 触发动作: unregister 所有 SW + 清光所有 caches + reload 一次
      //          (sessionStorage 守护防 reload 循环)
      // 平时:    no-op — 让 register-service-worker.ts 注册我们的 cache-first SW
      //          (apps/app/public/sw.js, 白名单缓存 hashed /assets/*).
      // 为什么放在 React bundle 之前：万一 bundle 是旧坏 SW precache 出来的，
      // 必须先 unregister 把那个旧 SW 干掉，否则 bundle 加载就会被它拦截。
      (function () {
        if (typeof window === "undefined") return;
        if (typeof navigator === "undefined" || !("serviceWorker" in navigator)) return;
        var active = false;
        try {
          var sp = new URLSearchParams(window.location.search);
          if (sp.has("nosw")) active = true;
        } catch (e) {}
        try {
          if (!active && window.localStorage.getItem("yinjie:nosw") === "1") active = true;
        } catch (e) {}
        if (!active) return;
        var GUARD_KEY = "yinjie:sw-cleanup-reload";
        var alreadyTried = false;
        try { alreadyTried = window.sessionStorage.getItem(GUARD_KEY) === "1"; } catch (e) {}
        if (alreadyTried) return;
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          return Promise.all((regs || []).map(function (r) { return r.unregister(); }))
            .then(function () {
              if (typeof caches !== "undefined" && caches.keys) {
                return caches.keys().then(function (keys) {
                  return Promise.all(keys.map(function (k) { return caches.delete(k); }));
                });
              }
            });
        }).then(function () {
          try { window.sessionStorage.setItem(GUARD_KEY, "1"); } catch (e) {}
          try { window.localStorage.removeItem("yinjie:nosw"); } catch (e) {}
          window.location.reload();
        }).catch(function () {});
      })();
    </script>
    <style>
      :root {
        color-scheme: light;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        background: #f5f5f5;
        color: #111827;
      }

      #root {
        min-height: 100vh;
        min-height: 100dvh;
      }

      .boot-screen {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding:
          max(24px, env(safe-area-inset-top, 0px))
          max(24px, env(safe-area-inset-right, 0px))
          max(24px, env(safe-area-inset-bottom, 0px))
          max(24px, env(safe-area-inset-left, 0px));
        box-sizing: border-box;
      }

      .boot-card {
        width: min(100%, 520px);
        background: #ffffff;
        border: 1px solid rgba(17, 24, 39, 0.05);
        border-radius: 32px;
        padding: 40px 32px;
        text-align: center;
        box-sizing: border-box;
      }

      .boot-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        border-radius: 999px;
        border: 1px solid rgba(7, 193, 96, 0.16);
        background: rgba(7, 193, 96, 0.08);
        color: #15803d;
        font-size: 11px;
        letter-spacing: 0.34em;
        text-transform: uppercase;
      }

      .boot-logo {
        width: 80px;
        height: 80px;
        margin: 24px auto 0;
        border-radius: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #07c160, #34c759);
        color: #ffffff;
        font-size: 28px;
        font-weight: 600;
        animation: boot-pulse 1.2s ease-in-out infinite;
      }

      .boot-title {
        margin: 24px 0 0;
        font-size: 34px;
        line-height: 1.2;
        letter-spacing: 0.08em;
      }

      .boot-copy {
        margin: 16px 0 0;
        font-size: 14px;
        line-height: 2;
        color: #6b7280;
      }

      .boot-steps {
        margin-top: 24px;
        display: grid;
        gap: 12px;
      }

      .boot-step {
        border-radius: 22px;
        border: 1px solid rgba(17, 24, 39, 0.05);
        background: #fafafa;
        padding: 12px 16px;
        text-align: left;
      }

      .boot-step-label {
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #9ca3af;
      }

      .boot-step-value {
        margin-top: 8px;
        font-size: 14px;
        font-weight: 600;
      }

      .boot-notice {
        margin-top: 24px;
        border-radius: 22px;
        padding: 14px 16px;
        background: rgba(7, 193, 96, 0.06);
        border: 1px solid rgba(7, 193, 96, 0.12);
        text-align: left;
        font-size: 14px;
        line-height: 1.8;
        color: #475569;
      }

      @media (min-width: 640px) {
        .boot-steps {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @keyframes boot-pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }

        50% {
          transform: scale(0.97);
          opacity: 0.9;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-screen">
        <div class="boot-card">
          <div class="boot-badge">Beyond Reality</div>
          <div class="boot-logo">隐界</div>
          <h1 class="boot-title">欢迎回到你的世界</h1>
          <p class="boot-copy">
            正在连接世界入口并同步这次进入所需的运行信息。
          </p>
          <div class="boot-steps">
            <div class="boot-step">
              <div class="boot-step-label">Step 1</div>
              <div class="boot-step-value">确认入口</div>
            </div>
            <div class="boot-step">
              <div class="boot-step-label">Step 2</div>
              <div class="boot-step-value">同步世界主人</div>
            </div>
            <div class="boot-step">
              <div class="boot-step-label">Step 3</div>
              <div class="boot-step-value">恢复上次停留</div>
            </div>
          </div>
          <div class="boot-notice">如果网络或入口服务较慢，这个启动页会先保留，避免用户看到空白页面。</div>
        </div>
      </div>
    </div>
    <script>
      // 浏览器（含内网穿透域名）首次访问时没有任何持久化配置或注入配置，
      // runtime 启动会判定 worldAccessMode 缺失而停在 "请先回到 setup" 页面。
      // 这里给纯 web 上下文一个默认值：
      // - 本地直连（localhost / 127.x / 私网 IP / *.local / *.lan / *.internal）：
      //   apiBaseUrl=${origin}，请求直连本机 api(3000)，单租户开发场景。
      // - 远程公网域名（vicp.fun / 公网 IP）：apiBaseUrl=${origin}/cloud/world-api，
      //   走 cloud-api 多租户反代到对应账号 child；nginx 在公网 Host 下对 /api/、
      //   /socket.io/ 直接返 403（commit 1c20a2fe），不能用裸 origin 否则朋友圈
      //   <video src>/<audio src>/<img src> 拼出的 /api/moments/media/* 全部 403
      //   播不了。这段逻辑必须和 runtime-config.ts 的 fallbackCoreApiBaseUrl 一致。
      // Capacitor / Tauri 等原生壳启动后会通过 hydrateNativeRuntimeConfig
      // 用真实的 apiBaseUrl 覆盖，所以这段注入不会干扰移动端和桌面壳。
      (function () {
        var w = window;
        if (!w || !w.location) return;
        var loc = w.location;
        if (loc.protocol !== "http:" && loc.protocol !== "https:") return;
        if (w.__YINJIE_RUNTIME_CONFIG__) return;
        if (w.Capacitor || w.__TAURI__ || w.__TAURI_INTERNALS__) return;
        function isLocalLikeHostname(host) {
          if (!host) return true;
          if (host === "localhost" || host === "::1") return true;
          if (host.indexOf("127.") === 0) return true;
          if (host.indexOf("10.") === 0 || host.indexOf("192.168.") === 0) return true;
          var m172 = /^172\.(\d+)\./.exec(host);
          if (m172) {
            var second = Number(m172[1]);
            if (second >= 16 && second <= 31) return true;
          }
          if (/\.(local|lan|internal)$/i.test(host)) return true;
          return false;
        }
        var isRemoteWeb = !isLocalLikeHostname(loc.hostname);
        var resolvedBaseUrl = isRemoteWeb
          ? loc.origin + "/cloud/world-api"
          : loc.origin;
        w.__YINJIE_RUNTIME_CONFIG__ = {
          apiBaseUrl: resolvedBaseUrl,
          socketBaseUrl: resolvedBaseUrl,
          worldAccessMode: isRemoteWeb ? "cloud" : "local",
          configStatus: "configured",
          bootstrapSource: "window",
        };
      })();
    </script>
    <script>
      // 公网隧道带宽 ~50KB/s，首屏 React 链下载 + 解析 + AppLocaleProvider catalog
      // 加载至少 3-5s。getWorldOwner 是 splash 必发的 API（~500ms RTT），早一点
      // 启动就能省掉 splash mount 后那一段等待 —— 让浏览器在解析 HTML 时就把这
      // 个请求发出去，与所有 JS 下载并行。SplashPage 直接 await 这个 in-flight
      // Promise，不再重复发 fetch。
      // 仅 worldAccessMode=local（即纯 web）下做：cloud / 原生壳走另一套 baseUrl，
      // 不能假设 origin 就是 api 入口。
      (function () {
        var w = window;
        if (!w || !w.fetch) return;
        if (w.Capacitor || w.__TAURI__ || w.__TAURI_INTERNALS__) return;
        var cfg = w.__YINJIE_RUNTIME_CONFIG__;
        if (!cfg || cfg.worldAccessMode !== "local") return;
        try {
          w.__YINJIE_BOOT_OWNER_FETCH__ = w.fetch("/api/world/owner", {
            credentials: "same-origin",
            headers: { "Accept": "application/json" },
          });
        } catch (_e) {
          // 网络/CORS 异常等下让 splash 自己 fallback 走完整链路。
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
