services:
  web:
    build:
      context: .
      dockerfile: apps/app/Dockerfile
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      - APP_API_UPSTREAM=http://api:3000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
    env_file:
      - api/.env
    environment:
      - DATABASE_PATH=/app/data/database.sqlite
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  site:
    build:
      context: .
      dockerfile: apps/site/Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${SITE_PUBLIC_URL:-https://1gw06751dd053.vicp.fun}
    ports:
      - "${SITE_PORT:-3001}:3001"
    environment:
      - NEXT_PUBLIC_SITE_URL=${SITE_PUBLIC_URL:-https://1gw06751dd053.vicp.fun}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/zh-CN >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
